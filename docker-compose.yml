version: '3.8'

services:
  document-search:
    build: .
    container_name: document-search-service
    ports:
      - "8080:8080"
    environment:
      - APP_RATE_LIMIT_REQUESTS_PER_SECOND=100.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
